<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadyWise — Product Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0c;--surface:#111114;--surface2:#1a1a1f;--surface3:#222228;
  --border:#2a2a32;--border2:#3a3a44;
  --text:#e8e8ec;--text2:#9898a4;--text3:#68687a;
  --accent:#c9a55a;--accent2:#e0c17a;--accent-dim:#c9a55a22;
  --red:#e04848;--green:#48c078;--blue:#4888e0;
  --radius:12px;--radius-sm:8px;
}
html{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,12,0.82);backdrop-filter:blur(20px) saturate(1.4);
  border-bottom:1px solid var(--border);
  padding:0 2rem;
}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;height:64px}
.logo{display:flex;align-items:center;gap:0.75rem;text-decoration:none}
.logo-icon{
  width:36px;height:36px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),#8a6a2a);
  display:grid;place-items:center;font-weight:700;font-size:14px;color:#fff;
  letter-spacing:-0.5px;
}
.logo-text{font-weight:600;font-size:1.1rem;color:var(--text);letter-spacing:-0.3px}
.logo-tag{font-size:0.7rem;color:var(--text3);font-weight:400;letter-spacing:0.5px;text-transform:uppercase;margin-left:-0.5rem}
.header-stats{margin-left:auto;display:flex;gap:1.5rem}
.stat{text-align:right}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:600;color:var(--accent)}
.stat-label{font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px}

/* SEARCH AREA */
.search-area{
  max-width:1400px;margin:0 auto;width:100%;
  padding:2rem 2rem 0;
}
.search-box{
  position:relative;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  transition:border-color 0.2s,box-shadow 0.2s;
}
.search-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.search-icon{position:absolute;left:1.25rem;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-input{
  width:100%;padding:1rem 1.25rem 1rem 3.25rem;
  background:transparent;border:none;outline:none;
  font-size:1rem;color:var(--text);font-family:'Inter',sans-serif;
}
.search-input::placeholder{color:var(--text3)}
.search-count{
  position:absolute;right:1.25rem;top:50%;transform:translateY(-50%);
  font-size:0.75rem;color:var(--text3);font-family:'JetBrains Mono',monospace;
}

/* FILTERS */
.filters{
  display:flex;gap:0.5rem;flex-wrap:wrap;
  padding:1rem 0 0;
}
.filter-btn{
  padding:0.4rem 0.85rem;border-radius:20px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);font-size:0.75rem;font-weight:500;
  cursor:pointer;transition:all 0.15s;white-space:nowrap;
  font-family:'Inter',sans-serif;
}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent2)}

/* GRID */
.main{max-width:1400px;margin:0 auto;width:100%;padding:1.5rem 2rem 3rem;flex:1}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:1rem;
}

/* CARD */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:all 0.2s;cursor:pointer;
  display:flex;flex-direction:column;
}
.card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.card-img{
  aspect-ratio:4/3;background:var(--surface2);
  display:grid;place-items:center;overflow:hidden;position:relative;
}
.card-img img{width:100%;height:100%;object-fit:contain;padding:0.75rem;transition:transform 0.3s}
.card:hover .card-img img{transform:scale(1.05)}
.card-img .no-img{
  color:var(--text3);font-size:0.8rem;display:flex;flex-direction:column;
  align-items:center;gap:0.5rem;
}
.card-img .no-img svg{opacity:0.3}
.card-body{padding:1rem 1.15rem;display:flex;flex-direction:column;gap:0.5rem;flex:1}
.card-sku{
  font-family:'JetBrains Mono',monospace;font-size:0.95rem;font-weight:600;
  color:var(--accent2);letter-spacing:-0.3px;
}
.card-type{font-size:0.8rem;color:var(--text2);font-weight:400}
.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.75rem 1.15rem;border-top:1px solid var(--border);
  margin-top:auto;
}
.card-loc{
  font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--text3);
  display:flex;align-items:center;gap:0.4rem;
}
.card-loc svg{width:14px;height:14px;opacity:0.5}
.badge{
  font-size:0.6rem;padding:0.2rem 0.5rem;border-radius:10px;
  font-weight:600;text-transform:uppercase;letter-spacing:0.5px;
}
.badge-img{background:#48c07818;color:var(--green)}
.badge-noimg{background:#e0484818;color:var(--red)}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);
  z-index:200;display:none;place-items:center;padding:2rem;
}
.modal-overlay.open{display:grid}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  max-width:560px;width:100%;overflow:hidden;animation:modalIn 0.2s;
}
@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-img{
  aspect-ratio:4/3;background:var(--surface2);display:grid;place-items:center;
  border-bottom:1px solid var(--border);
}
.modal-img img{max-width:100%;max-height:100%;object-fit:contain;padding:1.5rem}
.modal-body{padding:1.5rem}
.modal-sku{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:700;color:var(--accent2)}
.modal-row{display:flex;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid var(--border)}
.modal-row:last-child{border-bottom:none}
.modal-label{font-size:0.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;font-weight:500}
.modal-val{font-size:0.9rem;color:var(--text);font-weight:500}
.modal-close{
  position:absolute;top:1rem;right:1rem;width:36px;height:36px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border);color:var(--text2);
  display:grid;place-items:center;cursor:pointer;transition:all 0.15s;font-size:1.1rem;
}
.modal-close:hover{background:var(--surface3);color:var(--text)}

/* EMPTY STATE */
.empty{
  text-align:center;padding:4rem 1rem;color:var(--text3);
}
.empty svg{margin-bottom:1rem;opacity:0.3}
.empty h3{color:var(--text2);font-weight:500;margin-bottom:0.5rem}
.empty p{font-size:0.85rem}

/* RESPONSIVE */
@media(max-width:768px){
  .header-inner{padding:0}
  .header{padding:0 1rem}
  .search-area,.main{padding-left:1rem;padding-right:1rem}
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:0.75rem}
  .header-stats{display:none}
  .card-body{padding:0.75rem}
  .card-sku{font-size:0.8rem}
  .logo-tag{display:none}
}
</style>
</head>

        <div class="modal-row"><span class="modal-label">Image</span><span class="modal-val" id="modalImgStatus"></span></div>
      </div>
    </div>
  </div>
</div>

const types = [...new Set(PRODUCTS.filter(p=>p.type).map(p=>p.type))].sort();
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const search = document.getElementById('search');
const resultCount = document.getElementById('resultCount');
const filtersEl = document.getElementById('filters');
const modal = document.getElementById('modal');

document.getElementById('totalCount').textContent = PRODUCTS.length;
document.getElementById('imgCount').textContent = PRODUCTS.filter(p=>p.image).length;
document.getElementById('typeCount').textContent = types.length;

let activeType = null;

// Build filters
const allBtn = document.createElement('button');
allBtn.className = 'filter-btn active';
allBtn.textContent = 'All';
allBtn.onclick = () => { activeType = null; updateFilters(); render(); };
filtersEl.appendChild(allBtn);

types.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = t;
  btn.dataset.type = t;
  btn.onclick = () => { activeType = activeType === t ? null : t; updateFilters(); render(); };
  filtersEl.appendChild(btn);
});

function updateFilters() {
  filtersEl.querySelectorAll('.filter-btn').forEach(b => {
    if (!b.dataset.type) b.classList.toggle('active', !activeType);
    else b.classList.toggle('active', b.dataset.type === activeType);
  });
}

function render() {
  const q = search.value.toLowerCase().trim();
  const filtered = PRODUCTS.filter(p => {
    if (activeType && p.type !== activeType) return false;
    if (!q) return true;
    return p.sku.toLowerCase().includes(q) || p.type.toLowerCase().includes(q) || p.location.toLowerCase().includes(q);
  });

  resultCount.textContent = q || activeType ? filtered.length + ' / ' + PRODUCTS.length : '';

  if (!filtered.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map((p, i) => `
    <div class="card" onclick="openModal(${PRODUCTS.indexOf(p)})">
      <div class="card-img">
        ${p.image 
          ? `<img src="${p.image}" alt="${p.sku}" loading="lazy">` 
          : `<div class="no-img"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>No image</span></div>`
        }
      </div>
      <div class="card-body">
        <div class="card-sku">${p.sku}</div>
        <div class="card-type">${p.type || '—'}</div>
      </div>
      <div class="card-footer">
        <div class="card-loc">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${p.location || '—'}
        </div>
        <span class="badge ${p.image ? 'badge-img' : 'badge-noimg'}">${p.image ? 'IMG' : 'NO IMG'}</span>
      </div>
    </div>
  `).join('');
}

function openModal(idx) {
  const p = PRODUCTS[idx];
  document.getElementById('modalSku').textContent = p.sku;
  document.getElementById('modalType').textContent = p.type || '—';
  document.getElementById('modalLoc').textContent = p.location || '—';
  document.getElementById('modalImg').innerHTML = p.image
    ? `<img src="${p.image}" alt="${p.sku}">`
    : `<div class="no-img" style="padding:3rem"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span style="margin-top:0.5rem;color:var(--text3)">No image available</span></div>`;
  document.getElementById('modalImgStatus').innerHTML = p.image
    ? `<a href="${p.image}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:0.8rem">View full image ↗</a>`
    : '<span style="color:var(--red)">Not available</span>';
  modal.classList.add('open');
}

document.getElementById('modalClose').onclick = () => modal.classList.remove('open');
modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('open'); };
document.addEventListener('keydown', e => { if (e.key === 'Escape') modal.classList.remove('open'); });

search.addEventListener('input', render);
render();
</script>

  gap:0.6rem;
